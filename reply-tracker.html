<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Reply Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 16px 16px 80px;
      max-width: 520px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 24px 0 20px;
      border-bottom: 2px solid #D4AF37;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 1.6rem;
      color: #D4AF37;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 800;
    }

    header p {
      color: #666;
      font-size: 0.8rem;
      margin-top: 5px;
      letter-spacing: 0.5px;
    }

    /* --- Log section --- */
    .log-section {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 22px;
    }

    .log-section label {
      display: block;
      color: #D4AF37;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      background: #0f0f0f;
      border: 2px solid #2a2a2a;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 1.1rem;
      padding: 15px 16px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      min-width: 0;
    }

    input[type="text"]:focus { border-color: #D4AF37; }
    input[type="text"]::placeholder { color: #444; }

    button.log-btn {
      background: #D4AF37;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 800;
      padding: 15px 22px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    button.log-btn:active {
      background: #b89a2a;
      transform: scale(0.96);
    }

    button.undo-btn {
      width: 100%;
      margin-top: 8px;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #555;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    button.undo-btn:active {
      border-color: #D4AF37;
      color: #D4AF37;
      background: #1a1500;
    }

    button.undo-btn.hidden { display: none; }

    /* --- Stats section --- */
    .stats-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .stats-header h2 {
      color: #D4AF37;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .clear-btn {
      background: transparent;
      border: 1px solid #222;
      color: #555;
      border-radius: 6px;
      font-size: 0.72rem;
      padding: 5px 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .clear-btn:active {
      border-color: #cc2222;
      color: #cc2222;
    }

    /* --- Sort tabs --- */
    .sort-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .sort-tab {
      background: #0f0f0f;
      border: 1px solid #222;
      color: #555;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 9px 0;
      cursor: pointer;
      flex: 1;
      text-align: center;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .sort-tab.active {
      background: #1a1500;
      border-color: #D4AF37;
      color: #D4AF37;
    }

    /* --- Account cards --- */
    .empty-state {
      text-align: center;
      color: #333;
      padding: 50px 20px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .account-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 13px;
      padding: 16px 18px;
      margin-bottom: 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: border-color 0.2s, background 0.2s;
    }

    .account-card.flagged {
      border-color: #8b0000;
      background: #160505;
    }

    .card-left { flex: 1; min-width: 0; }

    .handle {
      font-size: 1.05rem;
      font-weight: 700;
      color: #e8e8e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .handle .at { color: #D4AF37; }

    .account-card.flagged .handle { color: #ff7070; }
    .account-card.flagged .handle .at { color: #ff4444; }

    .flag-badge {
      display: inline-block;
      background: #8b0000;
      color: #ffaaaa;
      font-size: 0.6rem;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 10px;
      letter-spacing: 1px;
      margin-left: 7px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .last-reply {
      color: #444;
      font-size: 0.72rem;
      margin-top: 3px;
    }

    .account-card.flagged .last-reply { color: #5a2020; }

    /* --- Count pills --- */
    .counts {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .count-pill { text-align: center; }

    .count-pill .num {
      display: block;
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1;
    }

    .count-pill.today .num { color: #D4AF37; }
    .account-card.flagged .count-pill.today .num { color: #ff4444; }

    .count-pill.week .num { color: #555; }

    .count-pill .lbl {
      display: block;
      font-size: 0.6rem;
      color: #3a3a3a;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-top: 2px;
    }

    .account-card.flagged .count-pill .lbl { color: #4a2020; }

    .divider {
      width: 1px;
      height: 34px;
      background: #1e1e1e;
      flex-shrink: 0;
    }

    .account-card.flagged .divider { background: #2e1010; }

    /* --- Toast --- */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #D4AF37;
      color: #000;
      padding: 13px 26px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.88rem;
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.warn { background: #8b0000; color: #ffaaaa; }
    .toast.neutral { background: #1e1e1e; color: #888; border: 1px solid #333; }
  </style>
</head>
<body>

<header>
  <h1>Reply Tracker</h1>
  <p id="today-date"></p>
</header>

<div class="log-section">
  <label for="handle-input">Log a Reply to X</label>
  <div class="input-row">
    <input
      type="text"
      id="handle-input"
      placeholder="@handle"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      list="handle-suggestions"
      inputmode="text"
    >
    <datalist id="handle-suggestions"></datalist>
    <button class="log-btn" onclick="logReply()">Log</button>
  </div>
  <button class="undo-btn hidden" id="undo-btn" onclick="undoReply()">↩ Undo Last</button>
</div>

<div>
  <div class="stats-header">
    <h2>Activity</h2>
    <button class="clear-btn" onclick="confirmClear()">Clear All</button>
  </div>
  <div class="sort-tabs">
    <button class="sort-tab active" id="sort-today" onclick="setSort('today')">Today</button>
    <button class="sort-tab" id="sort-week" onclick="setSort('week')">7 Days</button>
    <button class="sort-tab" id="sort-alpha" onclick="setSort('alpha')">A–Z</button>
  </div>
  <div id="account-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const KEY = 'reply_tracker_v1';
  let sortMode = 'today';

  function getData() {
    try { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
    catch { return []; }
  }

  function saveData(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

  function normalize(h) { return h.replace(/^@+/, '').trim().toLowerCase(); }

  function todayStart() {
    const d = new Date(); d.setHours(0, 0, 0, 0); return d.getTime();
  }

  function weekAgo() { return Date.now() - 7 * 24 * 60 * 60 * 1000; }

  function timeAgo(ts) {
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function buildStats(data) {
    const t0 = todayStart(), w0 = weekAgo();
    const map = {};
    for (const r of data) {
      if (r.ts < w0) continue;
      if (!map[r.handle]) map[r.handle] = { handle: r.handle, today: 0, week: 0, last: 0 };
      map[r.handle].week++;
      if (r.ts >= t0) map[r.handle].today++;
      if (r.ts > map[r.handle].last) map[r.handle].last = r.ts;
    }
    return Object.values(map);
  }

  function setSort(mode) {
    sortMode = mode;
    document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('sort-' + mode).classList.add('active');
    renderList();
  }

  function renderList() {
    const data = getData();
    let stats = buildStats(data);

    if (sortMode === 'today')     stats.sort((a, b) => b.today - a.today || b.week - a.week);
    else if (sortMode === 'week') stats.sort((a, b) => b.week - a.week   || b.today - a.today);
    else                          stats.sort((a, b) => a.handle.localeCompare(b.handle));

    const el = document.getElementById('account-list');
    if (!stats.length) {
      el.innerHTML = '<div class="empty-state">No replies logged yet.<br>Type a handle above and tap Log.</div>';
      return;
    }

    el.innerHTML = stats.map(s => {
      const flagged = s.today >= 3;
      return `
        <div class="account-card${flagged ? ' flagged' : ''}">
          <div class="card-left">
            <div class="handle">
              <span class="at">@</span>${escHtml(s.handle)}${flagged ? '<span class="flag-badge">HOT</span>' : ''}
            </div>
            <div class="last-reply">last reply ${timeAgo(s.last)}</div>
          </div>
          <div class="counts">
            <div class="count-pill today">
              <span class="num">${s.today}</span>
              <span class="lbl">Today</span>
            </div>
            <div class="divider"></div>
            <div class="count-pill week">
              <span class="num">${s.week}</span>
              <span class="lbl">7 Days</span>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function updateSuggestions() {
    const data = getData();
    const handles = [...new Set(data.map(r => r.handle))].sort();
    document.getElementById('handle-suggestions').innerHTML =
      handles.map(h => `<option value="@${h}">`).join('');
  }

  function updateUndoBtn() {
    const data = getData();
    document.getElementById('undo-btn').classList.toggle('hidden', data.length === 0);
    if (data.length > 0) {
      const last = data[data.length - 1];
      document.getElementById('undo-btn').textContent = `↩ Undo @${last.handle}`;
    }
  }

  function undoReply() {
    const data = getData();
    if (!data.length) return;
    const removed = data.pop();
    saveData(data);
    updateSuggestions();
    updateUndoBtn();
    renderList();
    showToast(`Removed @${removed.handle}`, 'neutral');
  }

  function logReply() {
    const input = document.getElementById('handle-input');
    const raw = input.value.trim();
    if (!raw) { showToast('Enter a handle first', 'neutral'); return; }
    const handle = normalize(raw);
    if (!handle) { showToast('Enter a valid handle', 'neutral'); return; }

    const data = getData();
    data.push({ handle, ts: Date.now() });
    saveData(data);
    input.value = '';
    updateSuggestions();
    updateUndoBtn();
    renderList();

    const todayCount = data.filter(r => r.handle === handle && r.ts >= todayStart()).length;
    if (todayCount >= 3) {
      showToast(`⚠ ${todayCount}× today — @${handle} flagged!`, 'warn');
    } else {
      showToast(`Logged @${handle} (${todayCount}× today)`);
    }
  }

  function confirmClear() {
    if (!confirm('Delete all logged replies? This cannot be undone.')) return;
    saveData([]);
    updateSuggestions();
    updateUndoBtn();
    renderList();
    showToast('All data cleared', 'neutral');
  }

  let toastTimer;
  function showToast(msg, type = 'gold') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type === 'warn' ? ' warn' : type === 'neutral' ? ' neutral' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  document.getElementById('handle-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') logReply();
  });

  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  updateSuggestions();
  updateUndoBtn();
  renderList();
</script>
</body>
</html>
